# Development Environment Configuration
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/thinkerscave_saas
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA - Show SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Multi-Tenancy
spring.jpa.properties.hibernate.multiTenancy=SCHEMA

# Logging - Verbose for development
logging.level.root=DEBUG
logging.level.com.thinkerscave=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT - Short expiration for testing
jwt.secret=dev_secret_key_minimum_256_bits_for_HS256_algorithm_testing_only
jwt.expiration=900000

# Mail - Development SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=thinkerscave2025.edu@gmail.com
spring.mail.password=ymfpilxejapzpbzz
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=8181

# Dev tools
spring.devtools.restart.enabled=true