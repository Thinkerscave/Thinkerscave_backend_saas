# Test Environment Configuration


# Database - Test database (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS "public"
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA - Test settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Multi-Tenancy
spring.jpa.properties.hibernate.multiTenancy=SCHEMA

# Logging - Minimal for tests
logging.level.root=WARN
logging.level.com.thinkerscave=INFO

# JWT - Test settings
jwt.secret=test_secret_key_minimum_256_bits_for_HS256_algorithm_testing_only_not_for_production
jwt.expiration=3600000

# Mail - Mock/disabled for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=testpassword

# Server
server.port=8182
